<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏰ 시간 도둑 잡아라</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F0F5FF;
      color: #1A3A5C;
      min-height: 100vh;
      padding: 56px 24px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    .header { margin-bottom: 40px; }

    .header-badge {
      display: inline-block;
      background: #1A3A5C;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .sparkle {
      display: inline-block;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.3); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1A3A5C;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .header p { font-size: 0.9rem; color: #6B8CAE; }

    .divider {
      height: 2px;
      background: linear-gradient(to right, #1A3A5C, #C5D8FF);
      border-radius: 2px;
      margin-bottom: 32px;
    }

    .list { display: flex; flex-direction: column; gap: 14px; }

    .item {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      border: 1.5px solid #DDE8FF;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .item:hover {
      border-color: #1A3A5C;
      box-shadow: 0 6px 20px rgba(26, 58, 92, 0.12);
      transform: translateY(-4px);
    }

    .item-tag {
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 16px 0 0 16px;
    }

    .item:nth-child(1) .item-tag { background: linear-gradient(to bottom, #7BA7E8, #A8C4F5); }
    .item:nth-child(2) .item-tag { background: linear-gradient(to bottom, #6ECFA8, #A8E6CE); }

    .item-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, #E4EDFF, #C5D8FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .item-content { flex: 1; }

    .item-title { font-size: 0.95rem; font-weight: 600; color: #1A3A5C; margin-bottom: 3px; }

    .item-desc { font-size: 0.82rem; color: #6B8CAE; line-height: 1.4; }

    .item-arrow {
      color: #B0C8E0; font-size: 18px; flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .item:hover .item-arrow { color: #1A3A5C; transform: translateX(4px); }

    .watermark {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 9pt;
      color: #1A3A5C;
      opacity: 0.2;
      font-weight: 500;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">
        <span class="sparkle">✨</span> 나만의 도구 모음 <span class="sparkle">✨</span>
      </div>
      <h1>⏰ 시간 도둑 잡아라</h1>
      <p>자주 쓰는 것들, 다 여기 모아뒀어요.</p>
    </div>

    <div class="divider"></div>

    <div class="list">
      <a href="아 맞다 여기 있었지/아 맞다 여기 있었지.html" class="item">
        <div class="item-tag"></div>
        <div class="item-icon">📝</div>
        <div class="item-content">
          <div class="item-title">아 맞다 여기 있었지</div>
          <div class="item-desc">흩어진 업무 메모 정리함</div>
        </div>
        <div class="item-arrow">→</div>
      </a>

      <a href="MoneyMap/MoneyMap.html" class="item">
        <div class="item-tag"></div>
        <div class="item-icon">💰</div>
        <div class="item-content">
          <div class="item-title">MoneyMap</div>
          <div class="item-desc">자금 현황 한눈에 보기</div>
        </div>
        <div class="item-arrow">→</div>
      </a>
    </div>
  </div>
  <div class="watermark">juuu8</div>
</body>
</html>

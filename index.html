<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏰ 시간 도둑 잡아라</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F4F6FA;
      color: #1A3A5C;
      min-height: 100vh;
      padding: 56px 24px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 40px;
    }

    .header-badge {
      display: inline-block;
      background: #1A3A5C;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1A3A5C;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 0.9rem;
      color: #6B8CAE;
    }

    .divider {
      height: 2px;
      background: linear-gradient(to right, #1A3A5C, #D8E6F3);
      border-radius: 2px;
      margin-bottom: 32px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      border: 1.5px solid #E2EAF4;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .item:hover {
      border-color: #1A3A5C;
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.1);
      transform: translateY(-1px);
    }

    .item-number {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #D8E6F3;
      color: #1A3A5C;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-content {
      flex: 1;
    }

    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1A3A5C;
      margin-bottom: 3px;
    }

    .item-desc {
      font-size: 0.82rem;
      color: #6B8CAE;
      line-height: 1.4;
    }

    .item-arrow {
      color: #B0C8E0;
      font-size: 18px;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .item:hover .item-arrow {
      color: #1A3A5C;
      transform: translateX(3px);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.78rem;
      color: #B0C8E0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">✦ 나만의 도구 모음</div>
      <h1>⏰ 시간 도둑 잡아라</h1>
      <p>자주 쓰는 것들, 다 여기 모아뒀어요.</p>
    </div>

    <div class="divider"></div>

    <div class="list">
      <a href="아 맞다 여기 있었지/아 맞다 여기 있었지.html" class="item">
        <div class="item-number">01</div>
        <div class="item-content">
          <div class="item-title">아 맞다 여기 있었지</div>
          <div class="item-desc">흩어진 업무 메모 정리함</div>
        </div>
        <div class="item-arrow">→</div>
      </a>

      <a href="MoneyMap/MoneyMap.html" class="item">
        <div class="item-number">02</div>
        <div class="item-content">
          <div class="item-title">MoneyMap</div>
          <div class="item-desc">자금 현황 한눈에 보기</div>
        </div>
        <div class="item-arrow">→</div>
      </a>
    </div>

    <div class="footer">파일이 생길 때마다 하나씩 추가해드릴게요.</div>
  </div>
</body>
</html>

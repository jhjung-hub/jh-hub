<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아 맞다 여기 있었지</title>
<style>
:root{
  --primary:#1e40af;--primary-light:#dbeafe;--primary-hover:#1d4ed8;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"맑은 고딕","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:var(--primary);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header-left{display:flex;flex-direction:column;gap:2px;}
.header-title{font-size:17px;font-weight:700;}
.header-sub{font-size:11px;opacity:.75;}
.header-btns{display:flex;gap:8px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.hbtn:hover{background:rgba(255,255,255,.28);}

/* SEARCH */
.search-bar{background:#fff;padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;}
.search-input{flex:1;max-width:520px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--primary);}
.search-count{font-size:12px;color:var(--muted);}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{display:inline-block;padding:10px 13px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none;}
.tab:hover{color:var(--primary);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.tab .cnt{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px;}
.tab.active .cnt{background:var(--primary);color:#fff;}
.tab-edit-btn{display:none;background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);padding:0 2px;vertical-align:middle;}
.tab:hover .tab-edit-btn{display:inline;}

/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:20px;}

/* MEMO CARD */
.memo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;transition:box-shadow .2s;position:relative;}
.memo-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.memo-card.user-added{border-left:3px solid var(--green);}
.memo-card.edited-base{border-left:3px solid var(--amber);}
.memo-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.memo-title{font-weight:700;font-size:14px;line-height:1.5;flex:1;}
.memo-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.btn{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn-copy{background:var(--primary-light);color:var(--primary);}
.btn-copy:hover{background:var(--primary);color:#fff;}
.btn-edit{background:#f0fdf4;color:var(--green);}
.btn-edit:hover{background:var(--green);color:#fff;}
.btn-del{background:#fef2f2;color:var(--red);}
.btn-del:hover{background:var(--red);color:#fff;}
.btn-share{background:#fefce8;color:var(--amber);}
.btn-share:hover{background:var(--amber);color:#fff;}
.btn-reset{background:#f8fafc;color:var(--muted);}
.btn-reset:hover{background:var(--muted);color:#fff;}
.memo-body{font-size:13.5px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.memo-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;}
.tag-cat{background:#f8fafc;color:var(--muted);}
.tag-tmpl{background:#f0fdf4;color:var(--green);}
.tag-warn{background:#fef9c3;color:#92400e;}
.tag-info{background:var(--primary-light);color:var(--primary);}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(30,64,175,.4);display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:200;}
.fab:hover{background:var(--primary-hover);}

/* OVERLAY + MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);}
.form-textarea{min-height:240px;resize:vertical;line-height:1.8;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn-primary{background:var(--primary);color:#fff;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;}
.btn-primary:hover{background:var(--primary-hover);}
.btn-secondary{background:#f1f5f9;color:var(--text);padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;}

/* SETTINGS MODAL */
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.cat-row:last-child{border-bottom:none;}
.cat-label{font-size:13px;color:var(--muted);width:80px;flex-shrink:0;}
.cat-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;}
.cat-input:focus{border-color:var(--primary);}

/* TOAST */
.toast{position:fixed;bottom:90px;right:20px;background:#1e293b;color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:400;}
.toast.show{opacity:1;}

/* STAR */
.star-btn{background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;transition:transform .15s;flex-shrink:0;}
.star-btn:hover{transform:scale(1.25);}

/* LOCK */
.btn-lock{background:#fdf4ff;color:#7e22ce;}
.btn-lock:hover{background:#7e22ce;color:#fff;}
.btn-lock.locked{background:#7e22ce;color:#fff;}
.memo-body-locked{filter:blur(5px);user-select:none;pointer-events:none;}
.unlock-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0 4px;flex-wrap:wrap;}
.pw-inline{padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;width:180px;}
.pw-inline:focus{border-color:var(--primary);}
.lock-notice{font-size:12px;color:var(--muted);}

/* PINNED SECTION */
.section-divider{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;padding:6px 0 10px;display:flex;align-items:center;gap:8px;}
.section-divider::after{content:"";flex:1;height:1px;background:var(--border);}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}
mark{background:#fef08a;border-radius:2px;padding:0 1px;}

@media(max-width:600px){
  .content{padding:12px;}
  .memo-card{padding:14px;}
  .header-btns{gap:5px;}
  .hbtn{padding:5px 9px;font-size:11px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">📋 아 맞다 여기 있었지</div>
    <div class="header-sub" id="memo-total-count"></div>
  </div>
  <div class="header-btns">
    <button class="hbtn" onclick="openPwSettings()">🔑 비밀번호</button>
    <button class="hbtn" onclick="openCatSettings()">⚙ 카테고리 설정</button>
    <button class="hbtn" onclick="exportHTML()">⬇ 내보내기</button>
  </div>
</div>

<div class="search-bar">
  <input class="search-input" id="search" type="text" placeholder="🔍 메모 검색..." oninput="renderMemos()">
  <span class="search-count" id="search-count"></span>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<button class="fab" onclick="openMemoModal()" title="새 메모 추가">＋</button>

<!-- MEMO MODAL -->
<div class="overlay" id="memo-overlay">
  <div class="modal">
    <h2 id="modal-title">새 메모 추가</h2>
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-is-base">
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select class="form-select" id="form-cat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="form-title" type="text" placeholder="메모 제목">
    </div>
    <div class="form-group">
      <label class="form-label">태그 (쉼표로 구분, 예: 템플릿, 참고)</label>
      <input class="form-input" id="form-tags" type="text" placeholder="예: 템플릿, 참고">
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="form-body" placeholder="메모 내용..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeMemoModal()">취소</button>
      <button class="btn-primary" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<!-- PASSWORD SETTINGS MODAL -->
<div class="overlay" id="pw-overlay">
  <div class="modal" style="max-width:420px;">
    <h2>🔑 비밀번호 설정</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:18px;">잠금 메모를 볼 때 사용할 비밀번호를 설정합니다.<br>비밀번호는 이 기기에만 저장됩니다.</p>
    <div id="pw-status" style="margin-bottom:14px;font-size:13px;"></div>
    <div class="form-group">
      <label class="form-label" id="pw-label-cur" style="display:none;">현재 비밀번호</label>
      <input class="form-input" id="pw-cur" type="password" placeholder="현재 비밀번호" style="display:none;margin-bottom:10px;">
      <label class="form-label">새 비밀번호</label>
      <input class="form-input" id="pw-new" type="password" placeholder="새 비밀번호 입력">
    </div>
    <div class="form-group">
      <label class="form-label">새 비밀번호 확인</label>
      <input class="form-input" id="pw-confirm" type="password" placeholder="새 비밀번호 다시 입력">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closePwSettings()">취소</button>
      <button class="btn-primary" onclick="savePwSettings()">저장</button>
    </div>
  </div>
</div>

<!-- CATEGORY SETTINGS MODAL -->
<div class="overlay" id="cat-overlay">
  <div class="modal">
    <h2>⚙ 카테고리 이름 수정</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">카테고리 이름을 원하는 대로 변경할 수 있습니다. 기본값으로 되돌리려면 비워두고 저장하세요.</p>
    <div id="cat-settings-rows"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeCatSettings()">취소</button>
      <button class="btn-primary" onclick="saveCatSettings()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// CATEGORIES (default names)
// ═══════════════════════════════════════
const DEFAULT_CATS = [
  {id:"all",        label:"전체"},
  {id:"vat",        label:"부가세"},
  {id:"payroll",    label:"인건비·원천세·연말정산"},
  {id:"corp_tax",   label:"법인세"},
  {id:"settlement", label:"결산"},
  {id:"deduction",  label:"공제·감면"},
  {id:"reg",        label:"사업자등록 및 정정"},
  {id:"tax",        label:"세무 지식"},
  {id:"fees",       label:"미수·수수료"},
  {id:"system",     label:"업무 시스템"},
];

// ═══════════════════════════════════════
// BASE MEMOS
// ═══════════════════════════════════════
const BASE_MEMOS = [

// ──── 부가세 ────
{id:"b01",cat:"vat",title:"예정고지 관련 (소규모 법인)",tags:["참고"],body:`직전과세기간 과세표준 1억5천 이하이면
소규모법인으로 보고 예정고지 납부로 예정신고를 대신합니다.

예정고지 납부 혹은 납부 없이 1~6월분을 7월에 한꺼번에 신고
고지분이 50만원 미만이면 세정지원으로 예정고지도 제외됩니다.

★ 예정고지 대신 예정신고 할 수 있는 사유
- 휴업 또는 사업부진으로 인하여 각 예정신고기간의 공급가액 또는 납부세액이
  직전 과세기간의 공급가액 또는 납부세액의 1/3에 미달하는 자`},

{id:"b02",cat:"vat",title:"부가세 자료요청 (소셜매출) - 템플릿",tags:["템플릿"],body:`안녕하세요 사장님,
부가세 신고자료 요청드립니다.

1. 소셜매출자료 (배민·요기요·쿠팡이츠 등)

◎ 온라인 직접 조회 방법
- 배달의민족: 배민 사장님광장 > 셀프서비스 > 주문정산 > 부가세 신고내역
  (만나서결제 같이보기 체크)
- 요기요: 사장님 > 매출관리 > 부가세신고자료
- 쿠팡이츠: 사장님포털 > 부가세신고자료
◎ 팩스 요청: 031-783-8877

2. 현금매출 (현금영수증 미발행분) - 월별 금액 정리
3. 종이로 받은 세금계산서 (임대료 등)
4. 카드 변경된 것 있으면 카드번호 전체 알려주세요
   > 홈택스 등록 필요 + 카드사에 자료 요청
   > 25년 7~12월 카드이용내역, 엑셀파일로 받아서 전달`},

{id:"b03",cat:"vat",title:"스마트스토어·네이버페이 매출 조회",tags:["참고"],body:`조회방법: 정산관리 > 정산내역 > 건별 정산내역 > (정산 기준일로 조회)

※ 부가세신고 내역자료에는 할인 적용 전 금액으로 집계됨.
스토어 할인 쿠폰 발행 이력이 있으면 기타매출 금액을 차감하여 신고해야 합니다.

◎ 결산 시 추가 확인
- 매출에서 수수료 차감 후 입금되는 계좌가 법인통장으로 되어있는지 확인
- 입금이 안 되고 계속 매출 잔액이 남아있는 경우 확인 필요`},

{id:"b04",cat:"vat",title:"조기환급 서류요청 - 템플릿",tags:["템플릿"],body:`<부가세 조기환급 서류요청>

아래 거래에 대해 서류 보내주세요.
1. 견적서 or 거래명세서
2. 입금확인증

감사합니다.
대한세무법인 드림.`},

{id:"b05",cat:"vat",title:"세금계산서 마이너스 발급 요청 - 템플릿",tags:["템플릿"],body:`"착오에 의한 이중발급 등" 사유로 마이너스 1장 발급해달라고 해주세요.`},

{id:"b06",cat:"vat",title:"쿠팡 정산금 조회 방법",tags:["참고"],body:`1) 판매자 직접배송 → 메가셀러론대출로 정산 들어옴
2) 로켓배송(쿠팡매입) → 정상적으로 정산됨
3) 제트배송-로켓그로스 (쿠팡에 물품 보내면 직접배송)
   → 메가셀러론대출로 정산 들어옴`},

// ──── 인건비·원천세·연말정산 ────
{id:"p01",cat:"payroll",title:"원천세 반기납부 변경신청 안내 - 템플릿",tags:["템플릿"],body:`안녕하세요 사장님,

현재 매월 인건비 신고·납부하고 있는데,
원천세 반기납부 변경 신청기간이어서 안내드립니다.

반기로 변경 시:
· 7월~12월분 → 다음해 1월 10일까지 신고·납부
· 1월~6월분 → 당해 7월 10일까지 신고·납부

즉 6개월치 급여를 한 번에 신고하고,
그에 따른 소득세·지방소득세 6개월치를 몰아서 납부하는 방법입니다.

고민해보시고 변경 여부 카톡으로 남겨주세요.`},

{id:"p02",cat:"payroll",title:"원천세 반기납부 설명 (내부 참고)",tags:["참고"],body:`원천세 신고방법:
① 매월 신고납부
② 반기납 (6개월치 한번에 신고납부)

반기신고를 한다고 해서 건강보험료에 변동이 생기는 것은 아님.
인건비신고에 대한 소득세·지방소득세를
 매월 납부 vs 6개월에 한번 납부 의 차이.
보험료는 급여가 상승하거나 낮아졌을 때 변동됨.`},

{id:"p03",cat:"payroll",title:"4대보험 신고기한",tags:["참고"],body:`1) 4대보험 자격취득 신고기한
 - 건강보험: 입사일 기준 14일 이내
 - 국민연금/고용/산재: 입사일 기준 다음달 15일까지
 ※ 신고 지연되어도 연체료는 없지만, 다음달에 2배 폭탄

2) 4대보험 자격상실 신고기한
 - 퇴사일 기준 다음달 15일까지
 - 신고하지 않으면 일정액 과태료 부과
   (고용보험 미신고 시 1명당 3만원)`},

{id:"p04",cat:"payroll",title:"두루누리 지원금",tags:["참고"],body:`◎ 두루누리지원금
- 근로자의 사회보험료(고용보험·국민연금)의 80% 지원
- 조건: 근로자 수 10명 미만, 월평균보수 260만원 미만인 신규가입 근로자와 그 사업주
- 2021년부터는 신규가입자에 대해서만 지원
  · 신규가입자: 지원신청일 직전 6개월간 고용보험과 국민연금 자격취득 이력이 없는 근로자
- 지원기간: 신규·기가입자 합산하여 36개월까지`},

{id:"p05",cat:"payroll",title:"급여 하향 신고 관련",tags:["참고"],body:`· 직원이 생기면 대표자도 직원 급여액 이상으로 같이 신고함.
· 인명별 고지내역을 근로자분, 사업자분을 구분하여 작성.
· 보험료를 줄이고 싶으면:
  - 급여액이 현재보다 20% 감소
  - 근로시간 줄이기
  - 제출 동의서 필요 (근로자와도 합의 필요)
  → 줄이면 경비(인건비)도 더 적어짐.`},

{id:"p06",cat:"payroll",title:"외국인 방문취업(H-2) 고용 절차",tags:["참고"],body:`외국인 근로자 체류자격이 "방문취업(H-2)"인 경우:

1. 고용노동부 발급 특례(외국동포) 외국인근로자 고용가능 확인서 먼저 발급
2. 사업주와 근로계약 체결
3. 근로개시일로부터 14일 이내에 관할 고용센터에 근로개시 신고
4. 이후 공단에 직원으로 취득신고 가능

※ 등록되지 않은 외국인근로자 채용 시 500만원 이하 과태료`},

{id:"i01",cat:"payroll",title:"연말정산 완료 메일 - 템플릿",tags:["템플릿"],body:`안녕하세요 대한세무법인입니다.

2025년 귀속 연말정산이 잘 마무리되었습니다.
직원별 근로소득 원천징수영수증 보내드립니다.

첨부파일 확인하여 직원들에게 배부 바랍니다.

연말정산하여 나온 환급·추가납부 소득세와 지방소득세는
2월 급여대장에 반영하시면 됩니다.
(원천징수영수증 첫 번째 페이지 하단 77번 차감징수세액 참고)

감사합니다.`},

{id:"i02",cat:"payroll",title:"종합소득세 필요서류 안내 (25년귀속) - 템플릿",tags:["템플릿"],body:`<25년귀속 종합소득세 필요서류>

1. 등본 (부양가족 등재하실 분 체크 및 뒷자리 포함
   - 25년도 소득금액 100만원 이하여야 가능)
2. 25년 지방세 세목별 과세증명서
   - 온라인: 위택스 발급가능
   - 오프라인: 주민센터, 구청 발급가능
3. 국세청에서 받은 종합소득세 안내문
4. 25년 경조사비 (사업관련 거래처에 지급한 경조사비
   - 청첩장/부고장 첨부 및 지급일자, 지급액 포함)
5. 환급받을 통장사본

위 자료들 메일 혹은 카톡으로
26.05.08 까지 보내주세요!
메일: tax@taxdh.net`},

{id:"i03",cat:"payroll",title:"종합소득세 신고수수료 청구 - 템플릿",tags:["템플릿"],body:`안녕하세요. 대한세무법인입니다.

아래와 같이 <종합소득세 신고> 신고수수료를 청구하오니,
확인하신 후 입금 부탁드립니다.

조정수수료: 000,000원 (부가세포함)
송금계좌: 기업은행 341-057820-01-014

감사합니다.`},

{id:"i04",cat:"payroll",title:"종합소득세 납부서 발송 - 템플릿",tags:["템플릿"],body:`안녕하세요. 대한세무법인입니다.
<종합소득세 신고>가 완료되어 납부서를 발송합니다.

▶ 세목: 종합소득세
납부할세액: 000,000원
납부기한: 2026.05.31

▶ 세목: 지방소득세 종합소득분
납부할세액: 00,000원
납부기한: 2026.05.31

감사합니다.`},

{id:"i05",cat:"payroll",title:"국민연금 종합소득세 처리",tags:["참고"],body:`<연금>
1. 국민연금공단
 - 14번 총연금액에 금액이 있다면 수입금액에 산입해야 한다. (66번 코드)
 - 2001년 이후 연금수령액이 중요함.

2. 사적연금
 - 1,200만원 이하는 종합과세 OR 분리과세 선택 가능
 - 350만원 이상부터 소득금액 발생 (필요경비가 350만원)`},

{id:"i06",cat:"payroll",title:"간편장부/복식부기 신고 서류 구분",tags:["참고"],body:`<간편장부>
표지 + 종합소득세 신고서 + 총수입금액 및 필요경비 명세서
+ 간편장부소득금액계산서
※ 재무제표 안 뽑기로 함.

<복식부기>
표지 + 종합소득세 신고서 + 각종 부속서류
+ 조정계산서 + 비교식 재무제표

★ 국세 지방세 납부서 없는 곳
조정료만 카톡 발송: 메일부, 카톡여
조정료 PDF만 필요: 메일부, 카톡부 (RPA>프로세스4>완료 저장됨)

건강보험 직장가입자 보수총액 신고
▶ 소득 금액 있는 곳은 기존과 동일 5/31까지 접수
▶ 결손난 곳은 7월 이후 소득금액증명`},

{id:"i07",cat:"payroll",title:"이전부터 간소화 연말정산 기준",tags:["참고"],body:`이전부터 간소화대로 한 곳은 그대로 쭉 가고,
그런 거 아니면 보통 급여공제한대로.`},

// ──── 법인세 ────
{id:"c01",cat:"corp_tax",title:"법인세 중간예납 대상자",tags:["참고"],body:`◎ 중간예납 신고 대상자
· 사업연도 6개월 초과 내국법인
· 국내사업장이 있는 사업연도 6개월 초과 외국법인
· 수익사업 영위 비영리법인

◎ 중간예납 의무 없는 법인
· 신설법인의 최초 사업연도
· 국내에 없는 사업장 외국법인
· 사업실적이 없는 휴업법인
· 청산법인
· 직전사업연도 납부실적으로 계산한 금액이 50만원 미만 (중소기업 한함)

중간예납기간: 해당 사업연도 1월1일~6월30일`},

{id:"c02",cat:"corp_tax",title:"법인세 수정신고 순서",tags:["참고"],body:`<법인세 수정신고 순서>
1. 법인세 신고서 - 첨부서식 마감해제
2. 수정내역 작성
3. 조정계산서 - 새로불러오기하여 반영
4. 신고서 - 새로불러오기하여 반영
5. 수정신고 마감
6. 신고서 출력하여 세무서에 서면제출
7. 지방세도 잊지 말고 수정&제출`},

{id:"c03",cat:"corp_tax",title:"미지급 세금 결산 처리",tags:["참고"],body:`미지급 세금은 전년도분을 정리해주는 것.
올해 발생한 정기예금 이자분과 중간예납은
선납세금으로 정리했다가
결산하는 시점에 법인세 등으로 대체시켜주고
올해 계상해야 될 미지급 법인세는
결산이 끝나는 시점에서 마무리.`},

{id:"c04",cat:"corp_tax",title:"가지급금 인정이자 계산",tags:["참고"],body:`★ 가지급금 발생 (통장 출금 시)
차) 가지급금  대) 보통예금.현금
적요1. 단기채권에서 대체 / 임시가지급

★ 가지급금 상환 (통장 입금 시)
차) 보통예금.현금  대) 가지급금
적요4. 단기채권으로 대체 / 가지급금회수

★ 인정이자 계산 순서
2. 이자율별 차입금 잔액계산
3. 가지급금, 가수금 적수계산
   1) 가지급금  2) 가수금  3) 당좌대출이자율
4. 인정이자계산 탭에서 인정이자를 확인한 후 조정

적요코드: 1) 가지급금 지급, 4) 가지급금 회수
당좌: 국세청장이 정하는 이율`},

{id:"c05",cat:"corp_tax",title:"자본증자",tags:["참고"],body:`유상증자 시:
· 주식할인발행차금 (비용전액)
· 부가세는 불공, 손금불산입

1. 증자 시 관련비용 처리
 · 비용처리 X → 주식발행비용으로 주식발행차금으로 처리해야 함
 · 증자와 관련된 법무사수수료 등은 부가세 공제대상이 되지 않음

2. 회계처리
 주식할인발행차금(381코드) / 보통예금

3. 주식할인발행차금 상각
 3년 상각 → 이익잉여금에서 차감`},

{id:"c06",cat:"corp_tax",title:"법인세중간예납 11월 관련",tags:["참고"],body:`원래 소득세 중간예납이 11월에 고지가 되고 납부를 해야하는데,
이번에 코로나로 3개월 연장이 되서 2월까지 납부.`},

// ──── 결산 ────
{id:"s01",cat:"settlement",title:"결산 체크리스트 (합계잔액시산표 기준)",tags:["참고"],body:`<결산>
1. 합계잔액시산표
 1) 부가세 > 매출, 매입, 부가세과표 확인
 2) 급여, 용역비 > 연말정산, 지급조서 확인
 3) 자산 > 고정자산등록 확인, 추가사항 업종등록
 4) 보통예금부터 순서대로 확인
 5) 매출, 매입 누락 확인 시 > 부가세 수정신고
 6) 대출에 대한 이자내역서
 7) 자본금, 임차보증금, 월세 > 임대차계약서 확인`},

{id:"s02",cat:"settlement",title:"결산 체크리스트 2 (복식부기 세부)",tags:["참고"],body:`1. 예금 잔액 맞추기
2. 부가세 대급금 맞추기
3. 인건비 > 원천징수신고대사표 (퇴직소득도) > 손익계산서에 있는지 확인
4. 4대보험 소득세 예수금 - 거래처원장(예수금) 확인
5. 보증금 체크
6. 고정자산
7. 대표자 건강보험료
8. 신용카드, 현금영수증 경비반영
9. 기타경비
10. 재고반영
11. 현금조정
12. 결산 재무제표 (제조-손익-대차-합잔)`},

{id:"s03",cat:"settlement",title:"법인 결산 요청 자료 (25년 - 최신)",tags:["템플릿"],body:`* 법인 결산 요청 자료 *

- 25년 07월 ~ 26년 01월분 법인카드 이용대금 명세서 (카드대금 납부명세서)
- 사업장 임대차 계약서 (갱신된 부분 확인 필요)
- 법인 주주명부 (2025.12.31 기준으로 작성, 도장날인)
- 법인 등기부등본 (25년 12월 말 기준)
- 법인계좌 이자/배당소득 원천징수 영수증 (은행 요청)
- 지방세 세목별 과세증명서 (민원24, 위택스)

* 위택스 발급방법:
  위택스 로그인 > 발급 > 문서안내 및 발급 > 지방세 과세증명서
  > 납세자조회 > 발급대상조회 > 25.01~25.12 설정 조회 후 목록출력 저장`},

{id:"s04",cat:"settlement",title:"법인 결산 요청 자료 (23년 버전)",tags:["참고"],body:`* 법인 결산 요청 자료 *

- 사업장 임대차 계약서 (갱신된 부분 확인 필요)
- 법인 주주명부 (2023.12.31 기준으로 작성, 도장날인)
- 법인 등기부등본 (23년 12월 말 기준)
- 법인계좌 이자/배당소득 원천징수 영수증 (은행 요청)
- 지방세 세목별 과세증명서 (민원24, 위택스, 이택스 발급가능)
- 법인 명의 각종 보험 증권 계약서
- 법인카드 월별 청구서 (신용카드만)

위택스 발급:
위택스 로그인 > 납부결과 > 증명서발급 > 납부확인서 (23.01~23.12)
12개월 설정 조회 후 목록출력 누르고 저장`},

{id:"s05",cat:"settlement",title:"★ 결산자료 요청 (21년 9월 기준)",tags:["참고"],body:`★ 2021년 9월기준 결산자료 요청드립니다.

1. 법인통장 엑셀파일 (상세한 적요 기재)
2. 법인카드 월별 청구서 (신용카드만)
3. 지방세 세목별 과세증명서
4. 법인통장 지출내역 관련 참고서류
   (계약서, 보험증권 등 자산 부채 관련서류)
5. 현금시제 지출한 간이영수증
6. 법인계좌 이자소득 원천징수영수증
7. 법인대출금이 있을 경우 원금 및 이자 상환내역서
8. 주식 등 변동여부 (주식양도양수계약서, 주주명부)`},

// ──── 공제·감면 ────
{id:"d01",cat:"deduction",title:"공제·감면세액 종류",tags:["참고"],body:`<중소기업에 해당하는 경우 - 중소기업만 적용>
 · 창업중소기업세액감면
 · 중소기업특별세액감면

<중소기업을 우대>
 · 통합투자세액공제
 · 고용증대세액공제

{id:"r04",cat:"reg",title:"PC방 본점·지점 (단위과세 vs 지점등기)",tags:["참고"],body:`◎ 지점등기
· 개별등기를 하고 대표를 각각 지정할 수 있음

{id:"r05",cat:"reg",title:"법인 지점등기 관련 (상법 vs 세법)",tags:["참고"],body:`지점 등기를 하는데, 단위과세를 하더라도 지점 등기가 상법상 의무다.
세법상으로는 지점등기 하는 데에 문제가 없지만,
상법상으로는 지점 미등기 시 과태료 대상이다.
단, 여태껏 부과된 적은 없으니 선택하시면 된다.`},

{id:"r06",cat:"reg",title:"법인 등기 없이 지점 사업자 내는 방법",tags:["참고"],body:`법인 등기하지 않고 사업자를 낼 수 있는 방법

· 기준은 회사별 정관에 있음 (표준약관 정관은 대부분 이사회 결의로만 가능)

{id:"t01",cat:"tax",title:"간이영수증 3만원 기준",tags:["참고"],body:`간이영수증은 3만원 미만인 금액에 대해서 비용처리가 가능합니다.
3만원이 초과한 금액에 대해서는 세금계산서, 카드영수증, 현금영수증 등
적격증빙서류가 있어야 비용처리가 가능합니다.

적격증빙자료가 없다면 3만원 초과 금액에 대해 2% 가산세가 있습니다.`},

{id:"t02",cat:"tax",title:"업무용 차량 비용처리 기준",tags:["참고"],body:`차량운행일지를 작성해야 비용인정.
작성하지 않으면 연간 1,500만원까지만 경비처리 가능.
임직원전용보험(업무전용자동차보험) 가입 필수.

연간 비용처리 한도: 1,500만원
 1) 총비용이 1,500만원 이하: 감가상각비 1,000만원 + 기타비용 500만원
 2) 총비용이 1,500만원 초과: 차량운행일지 비율에 따라 인정

◎ 차량 명의가 다를 경우
 · 일반 승용차량이어서 부가세 공제는 받지 못함
 · 자산으로 잡고 경비처리 하려면:
   - 구매대금이 사업자 계좌에서 나갔다는 증빙 필요
   - 업무전용 자동차보험 가입 필요
   - 자동차 등록증상 명의를 공동명의로 변경 권장`},

{id:"t03",cat:"tax",title:"차량운행기록부 작성 안내",tags:["참고"],body:`업무용사용거리(출퇴근용/일반업무용)까지 다 작성해야 합니다.

하단에는 항상 총주행거리합계 / 출퇴근용·일반업무용 총 합계가 있어야 합니다.
맨 처음 보내드렸던 서식에는 있는데, 수정해서 사용 중이신 것 같습니다.

◎ 예시
· 243조5170: 2,911km / 2,911km
· 366도6368: 25.01~25.09 13,260km / 25.09~25.12 5,468km
· 179허7704: 24,989km / 24,989km`},

{id:"t04",cat:"tax",title:"차량렌트/운용리스·금융리스 구분",tags:["참고"],body:`◎ 차량렌트: 24개월 이상 차를 빌리는 개념.

◎ 운용리스
 · 초기에 잔존가치를 설정하고 그 외 나머지 금액을 분할하여 비용 산정
 · 계약기간 종료 후: 잔존가치 지불하고 차량 인수 / 반납 / 재리스 선택 가능
 · 연간 4만km 운행거리 제한 있음

◎ 금융리스
 · 차량 실질적 소유로 간주, 자산 계상`},

{id:"t05",cat:"tax",title:"예술품·미술품 구입 시 적격증빙",tags:["참고"],body:`예술품·미술품 구입 시 적격증빙 가능한 것:
1. 계산서 (미술관, 갤러리)
2. 원천징수 (3.3% - 화가에게 직접 구입할 경우)

◎ 비용처리 기준
 · 1작품당 1천만원 이하: 당해 비용으로 손금산입 가능
   (자산 아니니까 5년 뒤에 팔아도 됨)
 · 시간이 흘러도 가치하락이 아니기 때문에 감가상각 하면 안 됨
 · "기타비유동자산"으로 잡을 것
 · 구입 후 전시해놓은 거 사진 찍어놓고, 내용 정리 필요
 · 1천만원 이상: 자산 (기타소득 22% 원천징수)`},

{id:"t06",cat:"tax",title:"시설장치·권리금 양도",tags:["참고"],body:`* 시설장치 및 권리금 양도
- 시설장치 및 권리금: 권리금포함된 총액으로 세금계산서 발행
- 권리금: 매수자가 기타소득 원천세 신고 및 납부
- 부가세 신고 시: 총수입금액 제외
- 종합소득세 신고 시: 기타소득(권리금) 합산 및 기납부세액 반영

참고) 시설장치 계약서 1부, 권리금 계약서 1부, 양도양수 검토자료

★ 권리금을 받은 사람이 신고 (준 사람은 신고 X)
포괄양수도인데 세금계산서 미발행 시 가산세.`},

{id:"t07",cat:"tax",title:"포괄양도양수 처리 방법",tags:["참고"],body:`<양수인 입장>
· 포괄양도양수계약서에 시설장치, 영업권 분리해서 써달라
· 기타소득도 신고해야 함

<양도인 입장>
· 시설장치만 양도하는 걸로 처리. 영업권 없이.
· 포괄양도양수계약서에만 영업권 빼고 시설장치만 써줄 것이 유리함

원칙대로면 기타소득 60%가 좋지만,
장부상으로는 처분이익이 오게끔 하는 게 좋음.
보통은 영업권 기타소득 신고하지 않음.

양수인이 법인이면:
· 양도인: 무조건 T/I 교부해야 함
· 양수인: 기타소득도 신고해야 함 (돈 주는 사람이 기타소득 신고)`},

{id:"t08",cat:"tax",title:"부동산임대업 간주임대료 이자율",tags:["참고"],body:`* 부동산임대업 간주임대료 이자율
· 2023.03.19 이전 폐업자 → 연 1.2% 적용
· 2023.03.20 이후 폐업자 및 계속 사업자 → 연 2.9% 적용

※ 기간 이자율 확인하여 상단의 이자율 버튼으로 정확한 이자율로 변경 바랍니다.`},

{id:"t09",cat:"tax",title:"부동산임대보증금 총수입금액",tags:["참고"],body:`*건설비총액: 건축물의 취득에 소요된 금액
*건축물의 연면적: 건축물관리대장의 건물 연면적
*임대면적: 임대차계약에 의하여 임대보증금 월세 등 실제로 임대하는 면적

<주택임대>
사업자등록 하지 않아도 되는 경우:
(1) 1세대가 1주택을 보유하고 해당 1주택으로 임대사업을 하는 경우 (부부합산 1주택 보유)
(2) 보유&임대중인 해당 주택이 기준시가 9억원 이하인 경우
(3) 보유&임대 중인 해당 주택이 국내에 소재한 주택인 경우`},

{id:"t10",cat:"tax",title:"면세사업장현황신고 가산세",tags:["참고"],body:`면세사업장현황신고 가산세

1. 사업장현황신고 불성실 가산세
 · 신고 안 하거나 수입금액에 미달하게 신고한 경우
 · 미신고, 미달하게 신고한 수입금액의 0.5%

2. 보고 불성실 가산세
 · 세금계산서(계산서)합계표를 제출기한 내 미제출하거나 사실과 다르게 기재된 경우
 · 공급가액의 0.5%
 · 제출기한 지난 후 1개월 이내 제출 시: 공급가액의 0.3%`},

{id:"t11",cat:"tax",title:"증빙불비 가산세 처리",tags:["참고"],body:`· 사업용계좌 미사용 → 인출금으로 정리 / 가산세 0.2%
· 증빙없이 경비처리: 증빙불비 2% + 영수증수취명세서 미제출 1% = 총 3%

적격증빙은 없는데 간이영수증 같은 건 있어서
상대방 사업자등록번호 같은 정보를 알고 있는 경우:
→ 영수증제출대상거래로 선택 후 정보 기재, 가산세는 증빙불비 2%만`},

{id:"t12",cat:"tax",title:"부가율·원가율·마진율 계산식",tags:["참고"],body:`부가율 = (매출 - 매입) / 매출 × 100
원가율 = 제품원가 / 판매가

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentCat = "all";
let userMemos    = JSON.parse(localStorage.getItem("user_memos")    || "[]");
let editedMemos  = JSON.parse(localStorage.getItem("edited_memos")  || "{}");
let hiddenMemos  = JSON.parse(localStorage.getItem("hidden_memos")  || "[]");
let customCats   = JSON.parse(localStorage.getItem("custom_cats")   || "{}");
let starredMemos = JSON.parse(localStorage.getItem("starred_memos") || "[]");
let lockedMemos  = JSON.parse(localStorage.getItem("locked_memos")  || "[]");
let pwHash       = localStorage.getItem("memo_pw_hash") || "bcf11257bc4e64c08d81a2055c77756082bfdb184d286a5b24bbbb38bf895c7b";
// 기본 잠금 메모 (민감정보) - 처음 로드 시에만 적용
const DEFAULT_LOCKED = ["sy02","f12","sy09"];
// 이번 세션에서 비밀번호 입력하여 열린 메모들 (새로고침하면 다시 잠김)
const unlockedSession = new Set();

function CATS() {
  return DEFAULT_CATS.map(c => ({...c, label: customCats[c.id] || c.label}));
}
function getCatLabel(id) {
  return CATS().find(c => c.id === id)?.label || id;
}
function allMemos() {
  const base = BASE_MEMOS
    .filter(m => !hiddenMemos.includes(String(m.id)))
    .map(m => editedMemos[m.id] ? {...m, ...editedMemos[m.id], _edited: true} : m);
  return [...base, ...userMemos];
}
function saveStorage() {
  localStorage.setItem("user_memos",    JSON.stringify(userMemos));
  localStorage.setItem("edited_memos",  JSON.stringify(editedMemos));
  localStorage.setItem("hidden_memos",  JSON.stringify(hiddenMemos));
  localStorage.setItem("custom_cats",   JSON.stringify(customCats));
  localStorage.setItem("starred_memos", JSON.stringify(starredMemos));
  localStorage.setItem("locked_memos",  JSON.stringify(lockedMemos));
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  // 처음 방문 시 민감 메모 자동 잠금
  if (!localStorage.getItem("locked_memos")) {
    lockedMemos = [...DEFAULT_LOCKED];
    saveStorage();
  }
  const hash = location.hash.replace("#","");
  if (hash.startsWith("memo-")) {
    const id = hash.replace("memo-","");
    const m = allMemos().find(m => String(m.id) === id);
    if (m) currentCat = m.cat;
  }
  buildTabs();
  renderMemos();
  updateCount();
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function buildTabs() {
  const all = allMemos();
  document.getElementById("tabs").innerHTML = CATS().map(c => {
    const cnt = c.id === "all" ? all.length : all.filter(m => m.cat === c.id).length;
    return `<div class="tab ${c.id===currentCat?"active":""}" onclick="selectCat('${c.id}')">
      ${esc(c.label)}<span class="cnt">${cnt}</span>
    </div>`;
  }).join("");
}

function selectCat(id) {
  currentCat = id;
  buildTabs();
  renderMemos();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderMemos() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let memos = currentCat === "all" ? allMemos() : allMemos().filter(m => m.cat === currentCat);
  if (q) memos = memos.filter(m => m.title.toLowerCase().includes(q) || m.body.toLowerCase().includes(q));

  document.getElementById("search-count").textContent = q ? `${memos.length}개 검색됨` : "";

  const el = document.getElementById("content");
  if (!memos.length) { el.innerHTML = '<div class="empty">😐 메모가 없습니다.</div>'; return; }

  // Split into starred vs normal
  const starred = memos.filter(m => starredMemos.includes(String(m.id)));
  const normal  = memos.filter(m => !starredMemos.includes(String(m.id)));

  let html = "";
  if (starred.length) {
    html += `<div class="section-divider">⭐ 즐겨찾기 (${starred.length})</div>`;
    html += starred.map(m => cardHTML(m, q)).join("");
    if (normal.length) html += `<div class="section-divider" style="margin-top:10px;">전체 메모</div>`;
  }
  html += normal.map(m => cardHTML(m, q)).join("");
  el.innerHTML = html;

  const hash = location.hash.replace("#","");
  if (hash.startsWith("memo-")) {
    const target = document.getElementById(hash);
    if (target) setTimeout(() => target.scrollIntoView({behavior:"smooth",block:"center"}), 100);
  }
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function hl(text, q) {
  if (!q) return esc(text);
  const safeQ = esc(q).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return esc(text).replace(new RegExp(`(${safeQ})`,"gi"),"<mark>$1</mark>");
}

function cardHTML(m, q) {
  const isUser    = userMemos.some(u => u.id === m.id);
  const isEdited  = !!m._edited;
  const isStarred = starredMemos.includes(String(m.id));
  const isLocked  = lockedMemos.includes(String(m.id));
  const isOpen    = unlockedSession.has(String(m.id));
  const catLabel  = getCatLabel(m.cat);
  const tags = (m.tags||[]).map(t =>
    `<span class="tag ${t==="템플릿"?"tag-tmpl":"tag-info"}">${esc(t)}</span>`).join("");

  const resetBtn = isEdited
    ? `<button class="btn btn-reset" onclick="resetMemo('${m.id}')" title="원본으로 되돌리기">↺ 초기화</button>`
    : "";
  const delBtn = `<button class="btn btn-del" onclick="deleteMemo('${m.id}','${isUser?"user":"base"}')" title="삭제">🗑 삭제</button>`;
  const lockBtn = `<button class="btn btn-lock ${isLocked?"locked":""}" onclick="toggleLock('${m.id}')" title="${isLocked?"잠금 해제":"잠금 설정"}">${isLocked?"🔒":"🔓"}</button>`;

  // 잠긴 메모이고 세션에서 열지 않은 경우
  const bodyHTML = (isLocked && !isOpen)
    ? `<div class="memo-body memo-body-locked">${esc(m.body)}</div>
       <div class="unlock-bar">
         <span class="lock-notice">🔒 잠긴 메모입니다.</span>
         <input class="pw-inline" type="password" id="pw-${m.id}" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')unlockMemo('${m.id}')">
         <button class="btn btn-primary" style="padding:6px 13px;" onclick="unlockMemo('${m.id}')">열기</button>
       </div>`
    : `<div class="memo-body">${hl(m.body, q)}</div>`;

  return `<div class="memo-card ${isUser?"user-added":isEdited?"edited-base":""}" id="memo-${m.id}">
    <div class="memo-head">
      <button class="star-btn" onclick="toggleStar('${m.id}')" title="${isStarred?"즐겨찾기 해제":"즐겨찾기 추가"}">${isStarred?"⭐":"☆"}</button>
      <div class="memo-title">${hl(m.title, q)}</div>
      <div class="memo-actions">
        ${lockBtn}
        <button class="btn btn-copy"  onclick="copyMemo('${m.id}')"  title="복사">📋 복사</button>
        <button class="btn btn-edit"  onclick="openEditModal('${m.id}')" title="수정">✏️ 수정</button>
        ${resetBtn}
        ${delBtn}
      </div>
    </div>
    ${bodyHTML}
    <div class="memo-tags">
      <span class="tag tag-cat">${esc(catLabel)}</span>
      ${tags}
      ${isEdited  ? '<span class="tag tag-warn">수정됨</span>' : ""}
      ${isLocked  ? '<span class="tag" style="background:#fdf4ff;color:#7e22ce;">🔒 잠금</span>' : ""}
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// PASSWORD HELPERS
// ═══════════════════════════════════════
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function checkPw(input) {
  if (!pwHash) return true; // 비밀번호 미설정 시 무조건 통과
  return (await hashPw(input)) === pwHash;
}

// ═══════════════════════════════════════
// LOCK
// ═══════════════════════════════════════
function toggleLock(id) {
  const sid = String(id);
  if (lockedMemos.includes(sid)) {
    lockedMemos = lockedMemos.filter(s => s !== sid);
    unlockedSession.delete(sid);
    toast("🔓 잠금이 해제되었습니다");
  } else {
    lockedMemos.push(sid);
    unlockedSession.delete(sid);
    toast("🔒 메모가 잠겼습니다");
  }
  saveStorage();
  renderMemos();
}

async function unlockMemo(id) {
  const input = document.getElementById("pw-" + id);
  if (!input) return;
  if (!pwHash) {
    toast("⚠️ 먼저 🔑 비밀번호 버튼에서 비밀번호를 설정해주세요");
    return;
  }
  const ok = await checkPw(input.value);
  if (ok) {
    unlockedSession.add(String(id));
    renderMemos();
    toast("✅ 잠금이 열렸습니다 (새로고침하면 다시 잠김)");
  } else {
    input.value = "";
    input.style.borderColor = "var(--red)";
    setTimeout(() => input.style.borderColor = "", 1200);
    toast("❌ 비밀번호가 틀렸습니다");
  }
}

// ═══════════════════════════════════════
// PASSWORD SETTINGS
// ═══════════════════════════════════════
function openPwSettings() {
  const hasPw = !!pwHash;
  document.getElementById("pw-label-cur").style.display = hasPw ? "block" : "none";
  document.getElementById("pw-cur").style.display = hasPw ? "block" : "none";
  document.getElementById("pw-cur").value = "";
  document.getElementById("pw-new").value = "";
  document.getElementById("pw-confirm").value = "";
  document.getElementById("pw-status").textContent = hasPw
    ? "✅ 비밀번호가 설정되어 있습니다. 변경하려면 현재 비밀번호를 입력하세요."
    : "⚠️ 비밀번호가 설정되지 않았습니다. 잠금 메모를 사용하려면 설정해주세요.";
  document.getElementById("pw-status").style.color = hasPw ? "var(--green)" : "var(--amber)";
  document.getElementById("pw-overlay").classList.add("open");
}
function closePwSettings() { document.getElementById("pw-overlay").classList.remove("open"); }

async function savePwSettings() {
  const curVal  = document.getElementById("pw-cur").value;
  const newVal  = document.getElementById("pw-new").value.trim();
  const confVal = document.getElementById("pw-confirm").value.trim();

  if (pwHash) {
    const ok = await checkPw(curVal);
    if (!ok) { toast("❌ 현재 비밀번호가 틀렸습니다"); return; }
  }
  if (!newVal) { toast("⚠️ 새 비밀번호를 입력해주세요"); return; }
  if (newVal !== confVal) { toast("⚠️ 비밀번호가 일치하지 않습니다"); return; }
  if (newVal.length < 4) { toast("⚠️ 비밀번호는 4자 이상이어야 합니다"); return; }

  pwHash = await hashPw(newVal);
  localStorage.setItem("memo_pw_hash", pwHash);
  closePwSettings();
  toast("✅ 비밀번호가 저장되었습니다");
}

// ═══════════════════════════════════════
// STAR
// ═══════════════════════════════════════
function toggleStar(id) {
  const sid = String(id);
  if (starredMemos.includes(sid)) {
    starredMemos = starredMemos.filter(s => s !== sid);
    toast("☆ 즐겨찾기에서 제거했습니다");
  } else {
    starredMemos.push(sid);
    toast("⭐ 즐겨찾기에 추가했습니다");
  }
  saveStorage();
  renderMemos();
}

// ═══════════════════════════════════════
// COPY / SHARE
// ═══════════════════════════════════════
function copyMemo(id) {
  const m = allMemos().find(m => String(m.id) === String(id));
  if (!m) return;
  navigator.clipboard.writeText(`【${m.title}】\n\n${m.body}`)
    .then(() => toast("📋 클립보드에 복사되었습니다"));
}
function shareMemo(id) {
  const url = location.origin + location.pathname + "#memo-" + id;
  navigator.clipboard.writeText(url).then(() => toast("🔗 링크가 복사되었습니다"));
  location.hash = "memo-" + id;
}

// ═══════════════════════════════════════
// MEMO MODAL (add / edit)
// ═══════════════════════════════════════
function openMemoModal() {
  document.getElementById("modal-title").textContent = "새 메모 추가";
  document.getElementById("edit-id").value = "";
  document.getElementById("edit-is-base").value = "";
  document.getElementById("form-title").value = "";
  document.getElementById("form-body").value = "";
  document.getElementById("form-tags").value = "";
  buildCatSelect(currentCat !== "all" ? currentCat : "vat");
  document.getElementById("memo-overlay").classList.add("open");
}

function openEditModal(id) {
  const m = allMemos().find(m => String(m.id) === String(id));
  if (!m) return;
  const isUser = userMemos.some(u => u.id === m.id);
  document.getElementById("modal-title").textContent = "메모 수정";
  document.getElementById("edit-id").value = m.id;
  document.getElementById("edit-is-base").value = isUser ? "" : "1";
  document.getElementById("form-title").value = m.title;
  document.getElementById("form-body").value = m.body;
  document.getElementById("form-tags").value = (m.tags||[]).join(", ");
  buildCatSelect(m.cat);
  document.getElementById("memo-overlay").classList.add("open");
}

function buildCatSelect(selected) {
  const sel = document.getElementById("form-cat");
  sel.innerHTML = CATS().filter(c => c.id !== "all").map(c =>
    `<option value="${c.id}" ${c.id===selected?"selected":""}>${esc(c.label)}</option>`
  ).join("");
}

function closeMemoModal() { document.getElementById("memo-overlay").classList.remove("open"); }

function saveMemo() {
  const title  = document.getElementById("form-title").value.trim();
  const body   = document.getElementById("form-body").value.trim();
  const cat    = document.getElementById("form-cat").value;
  const tags   = document.getElementById("form-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  const editId = document.getElementById("edit-id").value;
  const isBase = document.getElementById("edit-is-base").value === "1";

  if (!title || !body) { toast("⚠️ 제목과 내용을 입력해주세요"); return; }

  if (editId && isBase) {
    // Edit base memo → store override
    editedMemos[editId] = {title, body, cat, tags};
  } else if (editId && !isBase) {
    // Edit user memo
    const idx = userMemos.findIndex(m => String(m.id) === String(editId));
    if (idx !== -1) userMemos[idx] = {...userMemos[idx], title, body, cat, tags};
  } else {
    // New memo
    userMemos.push({id:"u_"+Date.now(), cat, title, body, tags});
  }

  saveStorage();
  updateCount();
  closeMemoModal();
  buildTabs();
  renderMemos();
  toast("✅ 저장되었습니다");
}

function resetMemo(id) {
  if (!confirm("수정 내용을 버리고 원본으로 되돌리시겠습니까?")) return;
  delete editedMemos[id];
  saveStorage();
  buildTabs();
  renderMemos();
  toast("↺ 원본으로 되돌렸습니다");
}

function deleteMemo(id, type) {
  if (!confirm("이 메모를 삭제하시겠습니까?")) return;
  if (type === "user") {
    userMemos = userMemos.filter(m => String(m.id) !== String(id));
  } else {
    hiddenMemos.push(String(id));
  }
  saveStorage();
  buildTabs();
  renderMemos();
  updateCount();
  toast("🗑 삭제되었습니다");
}

// ═══════════════════════════════════════
// CATEGORY SETTINGS
// ═══════════════════════════════════════
function openCatSettings() {
  const rows = DEFAULT_CATS.filter(c => c.id !== "all").map(c =>
    `<div class="cat-row">
      <span class="cat-label">[기본] ${esc(c.label)}</span>
      <input class="cat-input" data-id="${c.id}" type="text"
        value="${esc(customCats[c.id]||"")}"
        placeholder="${esc(c.label)}">
    </div>`
  ).join("");
  document.getElementById("cat-settings-rows").innerHTML = rows;
  document.getElementById("cat-overlay").classList.add("open");
}
function closeCatSettings() { document.getElementById("cat-overlay").classList.remove("open"); }
function saveCatSettings() {
  document.querySelectorAll("#cat-settings-rows .cat-input").forEach(inp => {
    const id  = inp.dataset.id;
    const val = inp.value.trim();
    if (val) customCats[id] = val;
    else delete customCats[id];
  });
  saveStorage();
  closeCatSettings();
  buildTabs();
  toast("✅ 카테고리 이름이 저장되었습니다");
}

// Close overlays on backdrop click
document.querySelectorAll(".overlay").forEach(o => {
  o.addEventListener("click", e => {
    if (e.target === o) {
      closeMemoModal();
      closeCatSettings();
      closePwSettings();
    }
  });
});

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
function exportHTML() {
  // Embed current localStorage state into exported HTML
  const script = `<script>
    (function(){
      localStorage.setItem("user_memos",   ${JSON.stringify(JSON.stringify(userMemos))});
      localStorage.setItem("edited_memos", ${JSON.stringify(JSON.stringify(editedMemos))});
      localStorage.setItem("hidden_memos", ${JSON.stringify(JSON.stringify(hiddenMemos))});
      localStorage.setItem("custom_cats",  ${JSON.stringify(JSON.stringify(customCats))});
    })();
  <\/script>`;
  const html = document.documentElement.outerHTML.replace("</head>", script + "</head>");
  const blob = new Blob([html], {type:"text/html;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "memo.html";
  a.click();
  toast("⬇ 내보내기 완료");
}

// ═══════════════════════════════════════
// TOAST / COUNT
// ═══════════════════════════════════════
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2300);
}
function updateCount() {
  document.getElementById("memo-total-count").textContent = `메모 ${allMemos().length}개`;
}

init();
</script>
</body>
</html>
